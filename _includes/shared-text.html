{% comment %}
  Shared, editable text region backed by Firestore. Any signed-in
  club member can edit; changes stream live to everyone else on
  the page.

  Usage:
    {% include shared-text.html %}
    <div class="shared-text"
         data-session="april-25"
         data-field="summary"
         data-placeholder="No summary yet — Jeff, drop your notes here."></div>

  Only include this once per page even if you drop multiple
  .shared-text elements.
{% endcomment %}

<style>
  .shared-text {
    margin: 0.5rem 0;
  }

  .shared-text .st-content {
    font-size: 0.95rem;
    color: var(--charcoal);
    line-height: 1.7;
    white-space: normal;
  }

  .shared-text .st-content.st-empty {
    color: var(--charcoal-light);
    font-style: italic;
  }

  .shared-text .st-meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    margin-top: 0.75rem;
    padding-top: 0.6rem;
    border-top: 1px dashed var(--cream-dark);
  }

  .shared-text .st-meta {
    font-size: 0.78rem;
    color: var(--charcoal-light);
    font-style: italic;
  }

  .shared-text .st-edit-btn,
  .shared-text .st-cancel-btn,
  .shared-text .st-save-btn {
    background: transparent;
    border: 1px solid var(--sage);
    color: var(--sage-dark);
    padding: 0.35rem 0.85rem;
    border-radius: 20px;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }

  .shared-text .st-edit-btn:hover,
  .shared-text .st-cancel-btn:hover {
    background: var(--sage);
    color: var(--white);
  }

  .shared-text .st-save-btn {
    background: var(--sage);
    color: var(--white);
  }

  .shared-text .st-save-btn:hover:not(:disabled) {
    background: var(--sage-dark);
    border-color: var(--sage-dark);
  }

  .shared-text .st-save-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .shared-text .st-input {
    width: 100%;
    min-height: 180px;
    padding: 0.75rem 0.95rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.92rem;
    line-height: 1.65;
    color: var(--charcoal);
    background: #fff;
    border: 1px solid #E4DCC9;
    border-radius: 8px;
    resize: vertical;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .shared-text .st-input:focus {
    outline: none;
    border-color: var(--sage);
    box-shadow: 0 0 0 3px rgba(143, 175, 143, 0.18);
  }

  .shared-text .st-edit-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    margin-top: 0.6rem;
  }

  .shared-text .st-actions {
    display: flex;
    gap: 0.5rem;
  }

  .shared-text .st-status {
    font-size: 0.78rem;
    color: var(--charcoal-light);
    font-style: italic;
  }

  .shared-text .st-status[data-state="saving"] {
    color: var(--charcoal-light);
  }

  .shared-text .st-status[data-state="saved"] {
    color: var(--sage-dark);
  }

  .shared-text .st-status[data-state="error"] {
    color: #B0403A;
  }

  .shared-text .hidden {
    display: none;
  }
</style>

<script type="module" src="{{ '/assets/js/shared-text.js' | relative_url }}"></script>
