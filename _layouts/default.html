<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <!-- ====================================================
       Auth Overlay — shown until Google sign-in succeeds
       ==================================================== -->
  <div id="auth-overlay">
    <div class="auth-card">
      <span class="auth-book-icon">📚</span>
      <h1>
        Feeling Good
        <em>Book Club</em>
      </h1>
      <p class="auth-tagline">A warm corner for our reading journey.<br>Sign in to join the conversation.</p>

      <button id="google-signin-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#fff" opacity=".9"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#fff" opacity=".9"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#fff" opacity=".9"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#fff" opacity=".9"/>
        </svg>
        Sign in with Google
      </button>

      <p id="auth-error" class="auth-error hidden"></p>

      <p class="auth-footer">Access is by invitation only.<br>Contact the organizer if you need to be added.</p>
    </div>
  </div>


  <!-- ====================================================
       Page Content — revealed after auth
       ==================================================== -->
  <div id="page-content" class="hidden">

    <header>
      <div class="header-inner">
        <span class="site-name">📚 Feeling Good Book Club</span>
        <nav class="site-nav">
          <div class="nav-item has-dropdown">
            <button class="nav-link">Tools ▾</button>
            <div class="nav-dropdown">
              <a href="{{ '/popcorn/' | relative_url }}" class="nav-dropdown-item">🍿 Popcorn Order</a>
            </div>
          </div>
        </nav>
        <div class="user-bar">
          <span id="user-name"></span>
          <button id="sign-out-btn">Sign out</button>
        </div>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer>
      <p>Made with love for our little book club ♡</p>
    </footer>

  </div>


  <!-- ====================================================
       Firebase config + member whitelist (injected by Jekyll)
       ==================================================== -->
  <script>
    const FIREBASE_CONFIG = {
      apiKey:            "{{ site.data.firebase.apiKey }}",
      authDomain:        "{{ site.data.firebase.authDomain }}",
      projectId:         "{{ site.data.firebase.projectId }}",
      storageBucket:     "{{ site.data.firebase.storageBucket }}",
      messagingSenderId: "{{ site.data.firebase.messagingSenderId }}",
      appId:             "{{ site.data.firebase.appId }}"
    };

    const ALLOWED_EMAILS = [
      {% for member in site.data.members -%}
      "{{ member.email | downcase }}"{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ];
  </script>

  <!-- Firebase Auth (ESM module via CDN) -->
  <script type="module" src="{{ '/assets/js/auth.js' | relative_url }}"></script>

</body>
</html>
